networks:
  reverse-proxy:
    external: true

# echo "PG_PASS=$(openssl rand -base64 36 | tr -d '\n')" >> .env
# echo "AUTHENTIK_SECRET_KEY=$(openssl rand -base64 60 | tr -d '\n')" >> .env

services:
  # https://docs.goauthentik.io/install-config/install/docker-compose/
  authentik-server:
    image: ghcr.io/goauthentik/server:2026.2.1
    container_name: authentik-server
    command: server
    depends_on:
      authentik-postgres:
        condition: service_healthy
        restart: true
    networks:
      - reverse-proxy
    volumes:
      - ~/home-server/authentik/media:/media:rw
      - ~/home-server/authentik/custom-templates:/templates:rw
    env_file:
      - .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: password
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    labels:
      traefik.enable: true
      traefik.http.routers.authentik.entrypoints: websecure
      traefik.http.routers.authentik.rule: Host(`authentik.${DOMAIN_NAME}`) || Host(`auth.${DOMAIN_NAME}`)
      traefik.http.routers.authentik.middlewares: chain-no-auth@file
      traefik.http.services.authentik.loadbalancer.server.port: 9000
    healthcheck:
      disable: true
      test: ["CMD", "curl", "--fail", "localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2.1
    container_name: authentik-worker
    command: worker
    depends_on:
      authentik-postgres:
        condition: service_healthy
        restart: true
    user: root
    networks:
      - reverse-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - ~/home-server/authentik/media:/media:rw
      - ~/home-server/authentik/certs:/certs:rw
      - ~/home-server/authentik/custom-templates:/templates:rw
    env_file:
      - .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: password
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?secret key required}
    healthcheck:
      test: ["CMD", "ak", "healthcheck"]
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G

  authentik-postgres:
    image: docker.io/library/postgres:18.3-alpine
    container_name: authentik-postgres
    networks:
      - reverse-proxy
    volumes:
      - ~/home-server/authentik/postgres:/var/lib/postgresql:rw
    env_file:
      - .env
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 512M
