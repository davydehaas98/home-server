networks:
  reverse-proxy:
    external: true

services:
  authelia:
    image: ghcr.io/authelia/authelia:4.39.2@sha256:7422c90751d71e68667eb33185b7900ec57bd7d03895d1102cb76ff0e7969ad0
    container_name: authelia
    restart: unless-stopped
    cpus: 4
    mem_limit: 8192m
    user: ${UID}:${GID}
    security_opt:
      - no-new-privileges:true
    expose:
      - 9091
    networks:
      - reverse-proxy
    volumes:
      - ~/home-server/authelia:/config:rw
    environment:
      - TZ=${TZ}
    healthcheck:
      disable: true
      test: ["CMD", "curl", "--fail", "http://authelia:9091/api/state"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
      start_interval: 5s
    labels:
      - traefik.enable=true
      - traefik.http.routers.authelia.entrypoints=websecure
      - traefik.http.routers.authelia.rule=Host(`authelia.${DOMAIN_NAME}`)
      - traefik.http.routers.authelia.middlewares=chain-no-auth@file
      - traefik.http.services.authelia.loadbalancer.server.port=9091
