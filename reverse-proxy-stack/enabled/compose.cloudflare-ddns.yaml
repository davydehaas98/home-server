# https://github.com/favonia/cloudflare-ddns
services:
  cloudflare-ddns:
    image: docker.io/favonia/cloudflare-ddns:1.16.2
    container_name: cloudflare-ddns
    deploy:
      resources:
        limits:
          cpus: '0.01'
          memory: 64M
        reservations:
          cpus: '0.001'
          memory: 16M
      restart_policy:
        condition: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    network_mode: host
    environment:
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:?error}
      DOMAINS: ${DOMAIN_NAME:?error}
      PROXIED: false
      # RRTYPE: A
      DELETE_ON_STOP: false
