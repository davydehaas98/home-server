networks:
  reverse-proxy:
    driver: bridge
    name: reverse-proxy

services:
  traefik:
    image: docker.io/library/traefik:v3.6.14
    container_name: traefik
    # user: ${UID}:${GID}
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"
      - "8080:8080/tcp"
      - "3179:3179/tcp"
      - "3179:3179/udp"
    networks:
      - reverse-proxy
    command:
      - --certificatesResolver.dns-resolver-cloudflare.acme.email=${CLOUDFLARE_EMAIL}
      - --providers.docker.defaultrule=Host(`{{ index .Labels "com.docker.compose.service" }}.${DOMAIN_NAME}`)
    volumes:
      - ~/home-server/traefik/letsencrypt:/letsencrypt:rw
      - ~/home-server/traefik:/etc/traefik:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      TZ: ${TZ}
      CF_API_EMAIL: ${CLOUDFLARE_EMAIL:?error}
      CF_API_KEY: ${CLOUDFLARE_API_KEY:?error}
    labels:
      traefik.enable: true
      traefik.http.routers.traefik.entrypoints: websecure
      traefik.http.routers.traefik.rule: Host(`traefik.${DOMAIN_NAME}`)
      traefik.http.routers.traefik.middlewares: chain-authentik@file
      traefik.http.routers.traefik.service: api@internal
      traefik.http.routers.traefik.tls.domains[0].main: "${DOMAIN_NAME}"
      traefik.http.routers.traefik.tls.domains[0].sans: "*.${DOMAIN_NAME}"
      traefik.http.routers.traefik.tls.domains[1].main: "${DOMAIN_NAME_1}"
      traefik.http.routers.traefik.tls.domains[1].sans: "*.${DOMAIN_NAME_1}"
      traefik.http.services.traefik.loadbalancer.server.port: 8080
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M
