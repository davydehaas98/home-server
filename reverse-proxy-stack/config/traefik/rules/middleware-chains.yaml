# https://doc.traefik.io/traefik/reference/routing-configuration/http/middlewares/overview/
# nano /traefik/rules/middleware-chains.yml
http:
  middlewares:
    chain-no-auth:
      chain:
        middlewares:
          - default-compress
          - default-headers
          - default-rate-limit
          - default-retry

    chain-basic-auth:
      chain:
        middlewares:
          - basic-auth
          - default-compress
          - default-headers
          - default-rate-limit
          - default-retry

    chain-authelia:
      chain:
        middlewares:
          - authelia
          - default-compress
          - default-headers
          - default-rate-limit
          - default-retry

    chain-authentik:
      chain:
        middlewares:
          - authentik
          - default-compress
          - default-headers
          - default-rate-limit
          - default-retry

    chain-oauth:
      chain:
        middlewares:
          - oauth
          - default-compress
          - default-headers
          - default-rate-limit
          - default-retry

    chain-immich:
      chain:
        middlewares:
          - immich-buffering
          - immich-headers
          - default-headers
          - default-rate-limit
          - default-retry

    chain-plex:
      chain:
        middlewares:
          - plex-buffering
          - plex-headers
          - default-retry

    chain-nextcloud:
      chain:
        middlewares:
          - nextcloud-redirect
          - default-headers
          - default-rate-limit
          - default-retry

    chain-actual-budget:
      chain:
        middlewares:
          - actual-budget-headers
          - authentik
          - default-compress
          - default-headers
          - default-rate-limit
          - default-retry
