networks:
  reverse-proxy:
    external: true

services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:1.5.6
    container_name: bazarr
    user: ${UID}:${GID}
    networks:
      - reverse-proxy
    volumes:
      - ~/home-server/bazarr:/config:rw
      - /mnt/storage/media/movies:/movies:rw
      - /mnt/storage/media/series:/series:rw
    environment:
      PGID: ${GID}
      PUID: ${UID}
      TZ: ${TZ}
    labels:
      traefik.enable: true
      traefik.http.routers.bazarr.entrypoints: websecure
      traefik.http.routers.bazarr.rule: Host(`bazarr.${DOMAIN_NAME}`) || Host(`subtitles.${DOMAIN_NAME}`)
      traefik.http.routers.bazarr.middlewares: chain-authentik@file
      traefik.http.services.bazarr.loadbalancer.server.port: 6767
      homepage.group: Media
      homepage.name: Bazarr
      homepage.icon: bazarr.png
      homepage.href: https://bazarr.${DOMAIN_NAME}
      homepage.description: Subtitle management
      homepage.widget.type: bazarr
      homepage.widget.url: https://bazarr.${DOMAIN_NAME}
      homepage.widget.key: ${BAZARR_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "--fail", "localhost:6767/ping"]
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 256M
