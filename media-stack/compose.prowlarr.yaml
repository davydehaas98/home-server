networks:
  reverse-proxy:
    external: true

services:
  prowlarr:
    image: ghcr.io/linuxserver/prowlarr:2.3.5
    container_name: prowlarr
    user: ${UID}:${GID}
    networks:
      - reverse-proxy
    volumes:
      - ~/home-server/prowlarr/config:/config:rw
    environment:
      PGID: ${GID}
      PUID: ${UID}
      TZ: ${TZ}
    labels:
      traefik.enable: true
      traefik.http.routers.prowlarr.entrypoints: websecure
      traefik.http.routers.prowlarr.rule: Host(`prowlarr.${DOMAIN_NAME}`)
      traefik.http.routers.prowlarr.middlewares: chain-authentik@file
      traefik.http.services.prowlarr.loadbalancer.server.port: 9696
      homepage.group: Media
      homepage.name: Prowlarr
      homepage.icon: prowlarr.png
      homepage.href: https://prowlarr.${DOMAIN_NAME}
      homepage.description: Indexer proxy
      homepage.widget.type: prowlarr
      homepage.widget.url: https://prowlarr.${DOMAIN_NAME}
      homepage.widget.key: ${PROWLARR_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "--fail", "localhost:9696/ping"]
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 512M
