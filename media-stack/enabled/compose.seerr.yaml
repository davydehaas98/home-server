networks:
  reverse-proxy:
    external: true

services:
  seerr:
    image: ghcr.io/seerr-team/seerr:v3.1.1
    container_name: seerr
    user: ${UID}:${GID}
    networks:
      - reverse-proxy
    volumes:
      - ~/home-server/seerr:/app/config:rw
    environment:
      LOG_LEVEL: DEBUG
      TZ: ${TZ}
    labels:
      traefik.enable: true
      traefik.http.routers.seerr.entrypoints: websecure
      traefik.http.routers.seerr.rule: Host(`seerr.${DOMAIN_NAME}`) || Host(`request.${DOMAIN_NAME}`)
      traefik.http.routers.seerr.middlewares: chain-authentik@file
      traefik.http.services.seerr.loadbalancer.server.port: 5055
    healthcheck:
      test: ["CMD", "wget", "--spider", "seerr:5055/api/v1/status"]
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.01'
          memory: 128M
