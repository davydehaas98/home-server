networks:
  reverse-proxy:
    external: true

services:
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:5.0.0
    container_name: sabnzbd
    user: ${UID}:${GID}
    networks:
      - reverse-proxy
    volumes:
      - ~/home-server/sabnzbd:/config:rw
      - /mnt/storage/downloads/usenet/complete:/downloads/usenet/complete:rw
      - /mnt/storage/downloads/usenet/incomplete:/downloads/usenet/incomplete:rw
    environment:
      PGID: ${GID}
      PUID: ${UID}
      TZ: ${TZ}
    labels:
      traefik.enable: true
      traefik.http.routers.sabnzbd.entrypoints: websecure
      traefik.http.routers.sabnzbd.rule: Host(`sabnzbd.${DOMAIN_NAME}`) || Host(`usenet.${DOMAIN_NAME}`)
      traefik.http.routers.sabnzbd.middlewares: chain-authentik@file
      traefik.http.services.sabnzbd.loadbalancer.server.port: 8080
    healthcheck:
      test: ["CMD", "curl", "--fail", "localhost:8080"]
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '1.0'
          memory: 4G
        reservations:
          cpus: '0.1'
          memory: 256M
