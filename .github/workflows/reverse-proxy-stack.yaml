name: Deploy reverse-proxy-stack

on:
  push:
    branches:
      - main
    paths:
      - 'reverse-proxy-stack/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TARGET_DIR: /home/homelab/compose/reverse-proxy-stack

jobs:
  deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Copy 'compose.*.yaml' files
        run: |
          rsync --verbose --delete --archive \
            --exclude '*.env' \
            ./reverse-proxy-stack/compose.*.yaml \
            homelab@${{ secrets.SSH_HOST }}:${{ env.TARGET_DIR }}

      - name: Start containers
        run: |
          ssh homelab@${{ secrets.SSH_HOST }} /bin/bash << ENDSSH
            cd ${{ env.TARGET_DIR }}

            args=()
            for filename in compose.*.yaml; do
              args+=(-f \$filename);
            done;

            echo "Running docker compose up.."
            echo "docker compose \${args[@]} up -d --remove-orphans"

            docker compose \${args[@]} up -d --remove-orphans

            echo "Pruning unused images.."
            docker image prune -a -f
          ENDSSH
