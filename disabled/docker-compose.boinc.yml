services:
  boinc:
    image: ghcr.io/linuxserver/boinc:8.0.4@sha256:ec4bc28dc90aa181b1bad6f15d6a8d565842814c943d639a23517f93cb3865be
    container_name: boinc
    restart: unless-stopped
    cpus: 4
    mem_limit: 8G
    environment:
    - PGID=${PGID}
    - PUID=${PUID}
    - TZ=${TZ}
    - PASSWORD= #optional
    volumes:
    - ${STORAGE_DIR}/boinc:/config
    ports:
    - 8080:8080
    devices:
    - /dev/dri:/dev/dri #optional
    labels:
    - diun.enable=true
    - diun.watch_repo=true
