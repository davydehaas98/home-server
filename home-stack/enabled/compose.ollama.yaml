networks:
  reverse-proxy:
    external: true

services:
  ollama:
    image: docker.io/ollama/ollama:0.16.1
    container_name: ollama
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 8G
        reservations:
          cpus: '1.0'
          memory: 2G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
    networks:
      - reverse-proxy
    volumes:
      - ~/home-server/ollama:/root/.ollama:rw
    environment:
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_NUM_THREADS: 2
