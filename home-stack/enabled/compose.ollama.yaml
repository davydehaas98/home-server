networks:
  reverse-proxy:
    external: true

services:
  ollama:
    image: docker.io/ollama/ollama:0.20.6
    container_name: ollama
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
        reservations:
          cpus: '1.0'
          memory: 2G
      restart_policy:
        condition: unless-stopped
    networks:
      - reverse-proxy
    ports:
      - "11434:11434/tcp"
    volumes:
      - ~/home-server/ollama:/root/.ollama:rw
    environment:
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_NUM_THREADS: 2
