networks:
  reverse-proxy:
    external: true

services:
  ollama:
    image: docker.io/ollama/ollama:0.21.0
    container_name: ollama
    networks:
      - reverse-proxy
    ports:
      - "11434:11434/tcp"
    volumes:
      - ~/home-server/ollama:/root/.ollama:rw
    environment:
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_NUM_THREADS: 2
    healthcheck:
      disable: true
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '4.0'
          memory: 16G
        reservations:
          cpus: '0.1'
          memory: 1G
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
