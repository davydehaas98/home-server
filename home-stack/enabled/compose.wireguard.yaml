networks:
  reverse-proxy:
    external: true

services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:1.0.20210914@sha256:039aab5f3c0eb584c9195f0d5414104a6521855c5e5e9812777a8ce61d56b2c6
    container_name: wireguard
    restart: unless-stopped
    cpus: 1
    mem_limit: 512m
    user: ${GID}:${UID}
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    ports:
      - 51820:51820/udp
    networks:
      - reverse-proxy
    environment:
      - TZ=${TZ}
      - PUID=${UID}
      - PGID=${GID}
    volumes:
      - ~/home-server/wireguard/config:/config:rw
