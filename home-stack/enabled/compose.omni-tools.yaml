networks:
  reverse-proxy:
    external: true

services:
  omni-tools:
    image: docker.io/iib0011/omni-tools:0.6.0
    container_name: omni-tools
    networks:
      - reverse-proxy
    labels:
      traefik.enable: true
      traefik.http.routers.it-tools.entrypoints: websecure
      traefik.http.routers.it-tools.rule: Host(`omni-tools.${DOMAIN_NAME}`)
      traefik.http.routers.it-tools.middlewares: chain-authentik@file
      traefik.http.services.it-tools.loadbalancer.server.port: 80
    healthcheck:
      disable: true
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 128M
