networks:
  reverse-proxy:
    external: true

services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.8.3
    container_name: open-webui
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
    networks:
      - reverse-proxy
    volumes:
      - ~/home-server/open-webui:/app/backend/data:rw
    environment:
      OLLAMA_NUM_PARALLEL: 1
      OLLAMA_NUM_THREADS: 2
    labels:
      traefik.enable: true
      traefik.http.routers.open-webui.entrypoints: websecure
      traefik.http.routers.open-webui.rule: Host(`open-webui.${DOMAIN_NAME}`) || Host(`ai.${DOMAIN_NAME}`)
      traefik.http.routers.open-webui.middlewares: chain-no-auth@file
      traefik.http.services.open-webui.loadbalancer.server.port: 8080
