networks:
  reverse-proxy:
    external: true

services:
  # sudo chown -R 472:472 ~/home-server/grafana
  grafana:
    image: docker.io/grafana/grafana:13.0.1
    container_name: grafana
    # user: ${GID}:${UID}
    networks:
      - reverse-proxy
    volumes:
      - ~/home-server/grafana:/var/lib/grafana:rw
    environment:
      TZ: ${TZ:?error}
      GF_USERS_ALLOW_SIGN_UP: false
    labels:
      traefik.enable: true
      traefik.http.routers.grafana.entrypoints: websecure
      traefik.http.routers.grafana.rule: Host(`grafana.${DOMAIN_NAME}`)
      traefik.http.routers.grafana.middlewares: chain-authentik@file
      traefik.http.services.grafana.loadbalancer.server.port: 3000
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://grafana:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '0.1'
          memory: 256M
        reservations:
          cpus: '0.01'
          memory: 128M
