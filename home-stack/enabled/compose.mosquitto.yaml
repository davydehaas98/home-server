networks:
  reverse-proxy:
    external: true

services:
  mosquitto:
    image: docker.io/library/eclipse-mosquitto:2.0.22
    container_name: mosquitto
    networks:
      - reverse-proxy
    ports:
      # MQTT default listener
      - "1883:1883/tcp"
      # MQTT for websockets
      - "9001:9001/tcp"
    volumes:
      - ~/home-server/mosquitto/config:/mosquitto/config:rw
      - ~/home-server/mosquitto/data:/mosquitto/data:rw
      - ~/home-server/mosquitto/log:/mosquitto/log:rw
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
