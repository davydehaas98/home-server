networks:
  reverse-proxy:
    external: true

services:
  alertmanager:
    image: docker.io/prom/alertmanager:v0.32.0
    container_name: alertmanager
    deploy:
      resources:
        limits:
          cpus: '0.01'
          memory: 64M
        reservations:
          cpus: '0.001'
          memory: 16M
      restart_policy:
        condition: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "localhost:9093"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
      start_interval: 5s
    user: ${UID}:${GID}
    command:
      - --config.file=/etc/alertmanager/config.yaml
      - --storage.path=/alertmanager
    networks:
      - reverse-proxy
    volumes:
      - ~/home-server/alertmanager/:/etc/alertmanager/:rw
