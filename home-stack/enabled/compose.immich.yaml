networks:
  reverse-proxy:
    external: true

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.6.3
    container_name: immich-server
    networks:
      - reverse-proxy
    volumes:
      - /mnt/md0/home-server/immich/upload:/usr/src/app/upload:rw
      - /etc/localtime:/etc/localtime:ro
    environment:
      UPLOAD_LOCATION: /mnt/md0/home-server/immich/upload
      DB_DATA_LOCATION: /mnt/md0/home-server/immich-postgres
      DB_HOSTNAME: immich-postgres
      DB_DATABASE_NAME: immich
      DB_USERNAME: immich
      DB_PASSWORD: immich
      REDIS_HOSTNAME: immich-valkey
    labels:
      traefik.enable: true
      traefik.http.routers.immich.entrypoints: websecure
      traefik.http.routers.immich.rule: Host(`immich.${DOMAIN_NAME}`)
      traefik.http.routers.immich.middlewares: chain-immich@file
      traefik.http.services.immich.loadbalancer.server.port: 2283
    depends_on:
      immich-postgres:
        condition: service_healthy
        restart: true
      immich-valkey:
        condition: service_healthy
        restart: true
    healthcheck:
      disable: false
    user: ${UID}:${GID}
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '0.1'
          memory: 128M

  immich-machine-learning:
    # For hardware acceleration, add one of -[armnn, cuda, openvino] to the image tag.
    image: ghcr.io/immich-app/immich-machine-learning:v2.6.3
    container_name: immich-machine-learning
    # extends: # uncomment this section for hardware acceleration - see https://immich.app/docs/features/ml-hardware-acceleration
    #   file: hwaccel.ml.yml
    #   service: cpu # set to one of [armnn, cuda, openvino, openvino-wsl] for accelerated inference - use the `-wsl` version for WSL2 where applicable
    networks:
      - reverse-proxy
    volumes:
      - ~/home-server/immich/machine-learning/model-cache:/cache:rw
    environment:
      NODE_ENV: production
    healthcheck:
      disable: false
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '4.0'
          memory: 2G
        reservations:
          cpus: '0.1'
          memory: 128M

  immich-postgres:
    image: ghcr.io/tensorchord/vchord-postgres:pg18-v1.0.0
    container_name: immich-postgres
    user: ${UID}:${GID}
    shm_size: 128M
    networks:
      - reverse-proxy
    volumes:
      - /mnt/md0/home-server/immich-postgres:/var/lib/postgresql:rw
    environment:
      POSTGRES_PASSWORD: immich
      POSTGRES_USER: immich
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: "--data-checksums"
    healthcheck:
      test: ["CMD", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 128M

  immich-valkey:
    image: docker.io/valkey/valkey:9.0.3
    container_name: immich-valkey
    networks:
      - reverse-proxy
    environment:
      REDIS_HOSTNAME: immich-valkey
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
    deploy:
      restart_policy:
        condition: unless-stopped
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 128M
