networks:
  reverse-proxy:
    external: true

services:
  tabby:
    image: ghcr.io/tabbyml/tabby:0.32.0
    container_name: tabby
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
      restart_policy:
        condition: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://tabby:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
      start_interval: 5s
    command:
      - serve
      - --device=cuda
      - --model=StarCoder-1B
      - --chat-model=Qwen2-1.5B-Instruct
    networks:
      - reverse-proxy
    volumes:
      - ~/home-server/tabby:/data:rw
    labels:
      traefik.enable: true
      traefik.http.routers.tabby.entrypoints: websecure
      traefik.http.routers.tabby.rule: Host(`tabby.${DOMAIN_NAME}`)
      traefik.http.routers.tabby.middlewares: chain-no-auth@file
      traefik.http.services.tabby.loadbalancer.server.port: 8080
